{% extends "base_full.html" %}

{% block content %}

<link rel="stylesheet" href="/static/visitors.css">

<div class="vistors-container">

<div class="visitors-header">

<div class="hero">
<h1>Users</h1>
</div>

<div class="activity-tabs">
<button class="tab-btn active" data-chart="visitors">Total Users</button>
<button class="tab-btn" data-chart="leads">Customers Leads</button>
<button class="tab-btn" data-chart="revenue">Revenue Estimate</button>

</div>


<div class="stats-row">

<div class="stat">
<h4>Total Leads</h4>
<h2>153.4k</h2>
<p>Leads last 365 days</p>
</div>

<div class="divider"></div>

<div class="stat">
<h4>New Customers</h4>
<h2>100.2k</h2>
<span class="badge red">10%</span>
<p>New customers last 365 days</p>
</div>

<div class="divider"></div>

<div class="stat">
<h4>Bounce Rate</h4>
<h2>54.4k</h2>
<span class="badge green">27%</span>
<p>Bounce rate Last 365 days</p>
</div>

</div>


<div class="chart-card">
<canvas id="activityChart"></canvas>
</div>



</div>


</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/visitors.js"></script>

{% endblock %}
